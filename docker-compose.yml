services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cashbox
      POSTGRES_USER: cashbox
      POSTGRES_PASSWORD: cashbox
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashbox -d cashbox"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://cashbox:cashbox@db:5432/cashbox
      JWT_SECRET: change-me
      REFRESH_TOKEN_EXPIRE_DAYS: 30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  front:
    build:
      context: ./cashbox_front
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./cashbox_front:/app
      - /app/node_modules
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  pgdata:
